name: custom_subs
description: "CustomSubs — Privacy-first subscription tracker"
publish_to: "none"
version: 1.5.1+55

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.2.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1

  # UI
  intl: ^0.19.0
  fl_chart: ^0.68.0
  simple_icons: ^14.6.1
  flutter_svg: ^2.0.0

  # Utilities
  uuid: ^4.4.2
  url_launcher: ^6.3.0
  app_settings: ^5.1.1
  share_plus: ^12.0.1
  file_picker: ^8.0.6
  path_provider: ^2.1.3

  # RevenueCat for subscription management
  # Updated to 9.x for iOS 26 compatibility (8.x failed to initialize on iOS 26.3)
  purchases_flutter: ^9.0.0

  # Analytics (anonymous, privacy-first)
  posthog_flutter: ^5.20.0

  # In-app review prompt (triggers after success moments)
  in_app_review: ^2.0.9
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/logos/

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans/DMSans-Variable.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/new_app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#6B9E8C"
  adaptive_icon_foreground: "assets/images/new_app_icon.png"
